name: Continuous Integration

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:
    branches:
      - '**'

jobs:
  ci:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: |
          cargo fmt --all -- --check
          cargo clippy

  tests:
    name: Run tests
    continue-on-error: true
    strategy:
      matrix:
        target:
          - aarch64-unknown-linux-gnu
        toolchain:
          - stable
        include:
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
          default: true
      - name: Install SoftHSM
        run: |
          sudo apt-get update -y -qq
          sudo apt-get install -y -qq libsofthsm2 opensc
      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Check
        run: cargo check --target ${{ matrix.target }} --workspace --all-targets
      - name: Test script
        env:
          RUSTFLAGS: "-D warnings"
          RUST_BACKTRACE: 1
        run: |
          adac-tests/run-tests.sh
          cargo build -p adac-cli
          ADAC_CLI=./target/debug/adac-cli adac-tests/pkcs11-test.sh
          # Does not work due to older OpenSSL version
          # ADAC_CLI=./target/debug/adac-cli adac-tests/offline-test.sh
